<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnaX | Official Community</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00dc82;
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.5);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            scroll-behavior: smooth;
        }

        /* Hintergrund & Navigation */
        #bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            z-index: -1;
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px);
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--text); text-decoration: none; margin-left: 30px;
            font-weight: 600; transition: 0.3s; opacity: 0.7;
        }

        .nav-links a:hover { opacity: 1; color: var(--primary); }

        /* --- Hamburger Animation Styles --- */
        .hamburger {
            display: none;
            cursor: pointer;
            z-index: 1100;
        }

        .bar {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px auto;
            background-color: var(--primary);
            transition: all 0.3s ease-in-out;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            nav { padding: 15px 25px; }
            .hamburger { display: block; }

            /* Verwandlung zum X */
            .hamburger.active .bar:nth-child(2) { opacity: 0; }
            .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

            .nav-links {
                position: fixed;
                right: -100%;
                top: 0;
                flex-direction: column;
                background-color: rgba(2, 6, 23, 0.98);
                backdrop-filter: blur(20px);
                width: 100%;
                height: 100vh;
                justify-content: center;
                transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                gap: 40px;
                margin: 0;
            }

            .nav-links.active { right: 0; }
            .nav-links a { margin: 0; font-size: 1.5rem; }
        }

        /* Hero Section */
        section { padding: 120px 10% 60px; min-height: 80vh; }
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { 
            font-family: 'Rubik Mono One'; font-size: clamp(3rem, 8vw, 6rem); 
            margin: 0; background: linear-gradient(180deg, #fff, #475569);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Item Bereich */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-top: 40px;
        }
        .item-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 25px; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,220,130,0.1); }
        .price-tag {
            background: var(--primary); color: #000; padding: 5px 15px;
            border-radius: 10px; font-weight: 800; display: inline-block; margin-top: 15px;
        }

        .btn {
            background: var(--primary); color: #000; padding: 15px 35px;
            border-radius: 12px; font-weight: 700; text-decoration: none;
            display: inline-block; cursor: pointer; border: none; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
        .btn:disabled { background: #334155; color: #94a3b8; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bg-glow"></div>

    <nav>
        <div style="font-family: 'Rubik Mono One'; font-size: 1.5rem; color: var(--primary);">SNAX</div>
        
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <div class="nav-links" id="nav-links">
            <a href="Startseite.html" onclick="toggleMenu()">Über uns</a>
            <a href="Item.html" onclick="toggleMenu()">Items</a>
            <a href="Rules.html" onclick="toggleMenu()">Regeln</a>
            <a href="https://discord.gg/eBZRakvCEW" class="btn">Discord</a>
        </div>
    </nav>

    <section class="hero" id="about">
        <span style="color: var(--primary); font-weight: 800; letter-spacing: 5px;">OFFIZIELL SNAX</span>
        <h1>WELCOME</h1>
        <p style="max-width: 700px; color: #94a3b8; font-size: 1.2rem; line-height: 1.6;">
            Die ultimative Community für Spieler. Entdecke exklusive Items, nimm an Events teil und werde Teil von etwas Großem.
        </p>
    </section>

    <section id="items">
        <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Item Katalog</h2>
        <p style="color: #94a3b8;">Hier siehst du die aktuell verfügbaren Items und Preise.</p>
        <div class="grid" id="item-list"></div>
    </section>

    <audio id="bg-music" loop>
        <source src="C418 - Moog City (SPOTISAVER).mp3" type="audio/mpeg">
    </audio>

    <script>
        // Item Admin
        const items = [
            { name: "SnaX VIP Rang", price: "250.000$", desc: "Exklusive Rechte auf dem Discord und Kundenpriorität.", icon: "fa-crown" },
            { name: "SnaX Booster Pack", price: "50.000$", desc: "Zufällige Loot-Box mit seltenen Drops.", icon: "fa-box-open" },
            { name: "Namens-Farbe", price: "80.000$", desc: "Wähle eine individuelle Farbe für deinen Namen. (Kommt Demnächst!) Nur auf Discord!", icon: "fa-palette" }
        ];

        // Items laden
        const itemList = document.getElementById('item-list');
        items.forEach(item => {
            itemList.innerHTML += `
                <div class="item-card">
                    <i class="fas ${item.icon}" style="font-size: 2rem; color: var(--primary);"></i>
                    <h3>${item.name}</h3>
                    <p style="color: #94a3b8; font-size: 0.9rem;">${item.desc}</p>
                    <div class="price-tag">${item.price}</div>
                </div>
            `;
        });

        // Hamburger Menu Logik
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            toggleMenu();
        });

        function toggleMenu() {
            if (window.innerWidth <= 768) {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
                // Scrollen verhindern wenn Menü offen
                document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
            }
        }
    </script>
</body>
</html>
